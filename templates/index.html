<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAssist AI</title>
</head>
<body>
    <h1>Triagem Médicas Inteligente</h1>
    <form method="POST">
        <textarea 
            name="sintomas"
            placeholder="Descreva seus sintomas:"
            rows="5"
            cols="40"></textarea>

        <br><br>

        <button type="submit">
                Analisar
        </button>
    </form>

    {% if resultado %}
         <h2>
            Especialidade sugerida:
            {{ resultado }}
         </h2>
    {% endif %}
</body>
</html>
